idea:
  title: Which linear directions are compositional?
  domain: nlp
  hypothesis: 'Not all linear directions in the residual stream of Transformer LLMs
    form coherent linear subspaces that can be composed; however, related vectors
    (such as those for "red" and "blue") may compose naturally. The research will
    identify which discovered linear directions are truly compositional and which
    are only approximately linear in limited contexts.

    '
  background:
    description: 'There is skepticism about the claim that linear representations
      in the residual stream of Transformer LLMs form a linear space where directions
      can be composed. The idea is that while some directions may compose naturally
      (e.g., related color vectors), others may not form coherent subspaces and are
      only approximately linear in tested regions. The goal is to systematically map
      which linear directions are compositional and which are not.

      '
